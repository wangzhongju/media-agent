version: "3.9"

services:
  media_agent:
    build:
      context: ..           # 项目根目录
      dockerfile: docker/Dockerfile
    image: media_agent:latest
    container_name: media_agent

    restart: unless-stopped

    # ── 设备直通（RK3588）────────────────────────────────
    devices:
      - /dev/dri:/dev/dri           # GPU/VPU（rkmpp 硬件解码）
      - /dev/dma_heap:/dev/dma_heap # DMA 堆（rkmpp 需要）
      - /dev/rknpu:/dev/rknpu     # NPU（如算法库直接访问 NPU）

    # ── 卷挂载 ────────────────────────────────────────────
    volumes:
      # Unix Socket 目录（与上级平台共享 /tmp）
      - /tmp:/tmp
      # 配置文件（覆盖容器内默认配置）
      - ./config/config.json:/app/config/config.json:ro
      # 日志持久化
      - media_agent_logs:/var/log/media_agent
      # 算法模型（按需挂载）
      - /opt/models:/opt/models:ro

    # ── 网络：仅本地，不暴露端口 ──────────────────────────
    network_mode: host

    # ── 环境变量 ──────────────────────────────────────────
    environment:
      - TZ=Asia/Shanghai

    # ── 进程限制 ──────────────────────────────────────────
    ulimits:
      nofile:
        soft: 2048
        hard: 2048

    # ── 资源限制（可选）──────────────────────────────────
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "4"
    #       memory: 2G

    # ── 健康检查（可选）──────────────────────────────────
    # healthcheck:
    #   test: ["CMD", "test", "-S", "/tmp/media_agent.sock"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3

volumes:
  media_agent_logs:

