version: "3.9"

services:
  media_agent:
    image: registry.cn-hangzhou.aliyuncs.com/haibo_chen/media_agent:latest
    container_name: media_agent
    user: "0:0"
    privileged: true

    restart: unless-stopped

    # ── 设备直通（RK3588）────────────────────────────────
    # devices:
    #   - /dev/mpp_service:/dev/mpp_service
    #   - /dev/dma_heap:/dev/dma_heap
    #   - /dev/rga:/dev/rga
    #   - /dev/dri/renderD128:/dev/dri/renderD128
    #   - /dev/dri/renderD129:/dev/dri/renderD129


    # ── 卷挂载 ────────────────────────────────────────────
    volumes:
      # Unix Socket 目录（与上级平台共享 /tmp）
      - /tmp:/tmp
      # 配置文件（覆盖容器内默认配置）
      # - ../config/config.json:/opt/media_agent/config/config.json:ro
      # 算法模型（按需挂载）
      # - ../third_party/edgeDeploy/example/weights:/opt/media_agent/models/weights:ro

    # ── 网络：仅本地，不暴露端口 ──────────────────────────
    network_mode: host

    # ── 环境变量 ──────────────────────────────────────────
    environment:
      - TZ=Asia/Shanghai

    # ── 进程限制 ──────────────────────────────────────────
    ulimits:
      nofile:
        soft: 2048
        hard: 2048

    # ── 资源限制（可选）──────────────────────────────────
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "4"
    #       memory: 2G

    # ── 健康检查（可选）──────────────────────────────────
    # healthcheck:
    #   test: ["CMD", "test", "-S", "/tmp/media_agent.sock"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3


